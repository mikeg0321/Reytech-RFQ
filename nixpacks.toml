# ╔══════════════════════════════════════════════════════════════════════╗
# ║ DEPLOY RULES — DO NOT CHANGE WITHOUT READING                       ║
# ║                                                                    ║
# ║ 1. Package sources are all Nix (cache.nixos.org / Fastly CDN).     ║
# ║    apt was removed on 2026-04-17 after archive.ubuntu.com became   ║
# ║    unreachable from Railway's build network for 30+ min, blocking  ║
# ║    every deploy. Nix's binary cache is on a different CDN and      ║
# ║    does not share that failure mode. See CLAUDE.md Deploy Guard    ║
# ║    Rails — the 2026-04-16 "don't touch nixpacks" guidance assumed  ║
# ║    apt mirrors would recover; they didn't.                         ║
# ║                                                                    ║
# ║ 2. Changing nixPkgs invalidates the Docker layer cache. Expect a  ║
# ║    one-time long deploy (~10 min) after any change here; subsequent║
# ║    deploys are fast because Nix has its own binary cache.          ║
# ║                                                                    ║
# ║ 3. DO NOT add aptPkgs back unless Ubuntu archive connectivity is   ║
# ║    confirmed stable. If you need a package not in nixpkgs, search  ║
# ║    https://search.nixos.org first.                                 ║
# ║                                                                    ║
# ║ 4. Binary names to be aware of:                                    ║
# ║    - Nix `tesseract` attribute includes English traineddata by     ║
# ║      default — separate tesseract-ocr-eng is not needed.           ║
# ║    - Nix `libreoffice-still` exposes both `soffice` and            ║
# ║      `libreoffice` binaries on PATH. src/forms/doc_converter.py    ║
# ║      already tries `soffice` first then falls back to              ║
# ║      `libreoffice`, so the name switch is transparent to callers.  ║
# ║    - Nix `poppler_utils` provides pdftotext, pdftoppm, pdfinfo     ║
# ║      (underscore in the nix attr, dash in the apt package name).   ║
# ╚══════════════════════════════════════════════════════════════════════╝

[phases.setup]
# All system packages via Nix. Served from cache.nixos.org (Fastly CDN),
# which is not subject to the archive.ubuntu.com outages that blocked
# builds on 2026-04-17.
nixPkgs = [
    "python3",
    "gcc",
    "tesseract",         # OCR CLI; includes English traineddata by default
    "poppler_utils",     # pdftotext, pdftoppm, pdfinfo — used by email_poller OCR fallback
    "libreoffice-still", # LTS branch; provides soffice + libreoffice for DOCX→PDF conversion
]

[phases.install]
cmds = ["python -m venv --copies /opt/venv", "/opt/venv/bin/pip install -r requirements.txt -c constraints.txt"]
