# ╔══════════════════════════════════════════════════════════════════════╗
# ║ DEPLOY RULES — DO NOT CHANGE WITHOUT READING                       ║
# ║                                                                    ║
# ║ 1. NEVER change [phases.setup] unless you understand Docker layer  ║
# ║    caching. Changing aptPkgs or nixPkgs invalidates the cache and  ║
# ║    forces a full re-download (40+ min on slow mirrors).            ║
# ║ 2. aptPkgs are cached as a Docker layer. Nix pkgs have their own  ║
# ║    binary cache (cache.nixos.org). Both are fast on cache hit.     ║
# ║ 3. If Ubuntu mirrors are broken, the retry in aptPkgs handles it. ║
# ║ 4. Test deploy changes in a Railway preview environment first.     ║
# ╚══════════════════════════════════════════════════════════════════════╝

[phases.setup]
# Heavy system packages via apt — cached as a Docker layer.
# libreoffice-writer is ~200MB. On cache hit: <1s. On cache miss: 10-40 min
# depending on Ubuntu mirror speed. DO NOT bust this cache unnecessarily.
aptPkgs = ["tesseract-ocr", "tesseract-ocr-eng", "poppler-utils", "libreoffice-writer"]
nixPkgs = ["python3", "poppler_utils", "gcc"]

[phases.install]
cmds = ["python -m venv --copies /opt/venv", "/opt/venv/bin/pip install -r requirements.txt -c constraints.txt"]
