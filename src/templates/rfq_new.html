{% extends "base.html" %}
{% block title %}New RFQ{% endblock %}

{% block content %}
<div style="max-width:800px;margin:0 auto">
 <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
  <a href="/" style="color:var(--ac);text-decoration:none">&larr; Home</a>
  <h1 style="margin:0;font-size:22px">Create RFQ Manually</h1>
 </div>

 <form id="rfq-form" method="POST" action="/api/v1/rfq/create" style="display:flex;flex-direction:column;gap:14px">

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
   <div>
    <label style="font-size:13px;color:var(--tx2);font-weight:600">Solicitation Number</label>
    <input name="solicitation_number" placeholder="e.g. 10840673" required
     style="width:100%;padding:10px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:15px;box-sizing:border-box">
   </div>
   <div>
    <label style="font-size:13px;color:var(--tx2);font-weight:600">Agency</label>
    <input name="agency" placeholder="e.g. CDCR, CalVet, DGS" required
     style="width:100%;padding:10px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:15px;box-sizing:border-box">
   </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
   <div>
    <label style="font-size:13px;color:var(--tx2);font-weight:600">Requestor Name</label>
    <input name="requestor_name" placeholder="Buyer name"
     style="width:100%;padding:10px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:15px;box-sizing:border-box">
   </div>
   <div>
    <label style="font-size:13px;color:var(--tx2);font-weight:600">Requestor Email</label>
    <input name="requestor_email" type="email" placeholder="buyer@agency.ca.gov"
     style="width:100%;padding:10px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:15px;box-sizing:border-box">
   </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
   <div>
    <label style="font-size:13px;color:var(--tx2);font-weight:600">Due Date</label>
    <input name="due_date" type="date"
     style="width:100%;padding:10px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:15px;box-sizing:border-box">
   </div>
   <div>
    <label style="font-size:13px;color:var(--tx2);font-weight:600">Ship To</label>
    <input name="ship_to" placeholder="Delivery address"
     style="width:100%;padding:10px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:15px;box-sizing:border-box">
   </div>
  </div>

  <div>
   <label style="font-size:13px;color:var(--tx2);font-weight:600">Notes</label>
   <textarea name="notes" rows="2" placeholder="Optional notes"
    style="width:100%;padding:10px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:15px;box-sizing:border-box;resize:vertical"></textarea>
  </div>

  <div>
   <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
    <label style="font-size:13px;color:var(--tx2);font-weight:600">Line Items</label>
    <button type="button" onclick="addRow()" style="padding:3px 10px;background:var(--ac);border:none;border-radius:4px;color:#fff;font-size:13px;cursor:pointer">+ Add Item</button>
   </div>
   <table id="items-table" style="width:100%;border-collapse:collapse;font-size:14px">
    <thead>
     <tr style="background:var(--sf);color:var(--tx2)">
      <th style="padding:8px;text-align:left;border-bottom:1px solid var(--bd)">Qty</th>
      <th style="padding:8px;text-align:left;border-bottom:1px solid var(--bd)">UOM</th>
      <th style="padding:8px;text-align:left;border-bottom:1px solid var(--bd)">Description</th>
      <th style="padding:8px;text-align:left;border-bottom:1px solid var(--bd)">Unit Price</th>
      <th style="padding:8px;width:40px;border-bottom:1px solid var(--bd)"></th>
     </tr>
    </thead>
    <tbody id="items-body"></tbody>
   </table>
  </div>

  <div style="display:flex;gap:10px;margin-top:8px">
   <button type="submit" style="padding:12px 28px;background:var(--ac);border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:700;cursor:pointer">Create RFQ</button>
   <a href="/" style="padding:12px 20px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;color:var(--tx2);font-size:15px;text-decoration:none;display:flex;align-items:center">Cancel</a>
  </div>
 </form>
</div>

<script>
var _rowIdx = 0;
function addRow(){
 var i = _rowIdx++;
 var tr = document.createElement('tr');
 tr.innerHTML =
  '<td style="padding:4px"><input name="items['+i+'][qty]" type="number" value="1" min="1" style="width:60px;padding:6px;background:var(--sf);border:1px solid var(--bd);border-radius:4px;color:var(--tx)"></td>'+
  '<td style="padding:4px"><select name="items['+i+'][uom]" style="padding:6px;background:var(--sf);border:1px solid var(--bd);border-radius:4px;color:var(--tx)"><option>EA</option><option>BX</option><option>CS</option><option>PK</option><option>DZ</option><option>RL</option></select></td>'+
  '<td style="padding:4px"><input name="items['+i+'][description]" placeholder="Item description" style="width:100%;padding:6px;background:var(--sf);border:1px solid var(--bd);border-radius:4px;color:var(--tx);box-sizing:border-box"></td>'+
  '<td style="padding:4px"><input name="items['+i+'][unit_price]" type="number" step="0.01" placeholder="0.00" style="width:80px;padding:6px;background:var(--sf);border:1px solid var(--bd);border-radius:4px;color:var(--tx)"></td>'+
  '<td style="padding:4px"><button type="button" onclick="this.closest(\'tr\').remove()" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:16px">x</button></td>';
 document.getElementById('items-body').appendChild(tr);
}
addRow(); // Start with one row
</script>
{% endblock %}
