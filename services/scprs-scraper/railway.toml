[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# startCommand removed 2026-05-12: Railway passes startCommand as exec-form
# which doesn't expand $PORT. The Dockerfile CMD is shell-form and
# expands ${PORT:-8001} at container start.
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
