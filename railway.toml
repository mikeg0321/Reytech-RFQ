[build]
builder = "NIXPACKS"

[deploy]
startCommand = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 --max-requests 10000 --max-requests-jitter 500 --worker-tmp-dir /dev/shm"
healthcheckPath = "/ping"
# 2026-04-12 incident: 4 consecutive deploys (including a rollback to a
# known-good image) hit "1/1 replicas never became healthy!" because the
# 30s window was tighter than the boot path:
#   1. gunicorn starts
#   2. create_app() loads 23 route modules with 1093 deferred fns
#   3. DB schema check + migrations
#   4. Secrets startup_check
# Total cold boot can run 30-60s. The healthcheck only probes /ping (a
# 3-line `return "pong"`), so the wall is purely "is gunicorn accepting
# connections yet". 300s gives generous margin without affecting
# steady-state runtime behavior.
#
# 2026-05-07 (issue #415): removed the DROP TRIGGER preamble that ran
# `DROP TRIGGER IF EXISTS validate_*` on 12 names against the 1.2GB
# SQLite DB on every boot (~10-15s cold-mount cost). The DROP existed
# so updated trigger bodies in code wouldn't be silently shadowed by
# `CREATE TRIGGER IF NOT EXISTS` in migration #20 — but the bodies
# haven't changed since they were introduced (commit 6d78e914), so the
# preamble was a permanent no-op tax on every deploy.
#
# Going forward: when a trigger body changes, ADD A NEW MIGRATION that
# DROPs the old + CREATEs the new (see migration #20 for the shape).
# The migration-version guard ensures it runs exactly once per deploy,
# tracked in `schema_migrations`. `tests/test_validate_trigger_bodies.py`
# pins the current SHA so a body change can't ship without also
# updating the test (and forcing the developer to add the migration).
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[volumes]]
name = "reytech-data"
mountPath = "/data"
