name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check (all modules)
        run: |
          python -m py_compile src/api/dashboard.py
          python -m py_compile src/api/modules/routes_pricecheck.py
          python -m py_compile src/api/modules/routes_rfq.py
          python -m py_compile src/api/modules/routes_crm.py
          python -m py_compile src/agents/email_poller.py
          echo "All modules compile OK"

      - name: Namespace injection tests
        run: python -m pytest tests/test_namespace_injection.py -v --tb=short

      - name: Core pipeline tests
        run: python -m pytest tests/test_pipeline.py -v --tb=short -m "not slow"
        continue-on-error: true  # don't block deploy on pipeline tests
