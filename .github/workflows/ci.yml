name: CI — Pre-Deploy Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:  # manual trigger for diagnosis

# Skip CI entirely for docs/memory-only changes. Saves minutes.
# To force CI on a docs-only PR, add the `full-ci` label.

concurrency:
  # PRs: same PR → same group → cancel in progress (kills old run on force-push).
  # Main/workflow_dispatch: each commit gets a unique group via github.sha so
  # rapid merges don't cancel each other — pre-2026-04-19 the group was just
  # `ci-${{ github.ref }}`, which made every main push share a ref and the
  # result was 48/50 cancelled runs and an effectively-disabled gate.
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Gating: decide whether to run anything based on paths + labels
  # ─────────────────────────────────────────────────────────────────
  gate-decision:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      run_fast: ${{ steps.decide.outputs.run_fast }}
      run_full: ${{ steps.decide.outputs.run_full }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
      - id: decide
        name: Decide which jobs to run
        run: |
          set -e
          EVENT="${{ github.event_name }}"
          REF="${{ github.ref }}"
          LABELS='${{ toJson(github.event.pull_request.labels) }}'
          echo "event=$EVENT ref=$REF"

          # Default: run fast, not full
          RUN_FAST="true"
          RUN_FULL="false"

          # Main branch pushes always get full CI
          if [ "$EVENT" = "push" ] && [ "$REF" = "refs/heads/main" ]; then
            RUN_FULL="true"
            echo "→ push to main: full CI"
          fi

          # Manual dispatch always gets full CI
          if [ "$EVENT" = "workflow_dispatch" ]; then
            RUN_FULL="true"
            echo "→ workflow_dispatch: full CI"
          fi

          # PRs with full-ci label get full CI
          if echo "$LABELS" | grep -q '"name":"full-ci"'; then
            RUN_FULL="true"
            echo "→ full-ci label present: full CI"
          fi

          # Paths filter: skip everything for docs-only changes
          if [ "$EVENT" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/main...HEAD || true)
            echo "Changed files:"
            echo "$CHANGED"
            NON_DOCS=$(echo "$CHANGED" | grep -v -E '^(docs/|.*\.md$|_overnight_review/|memory/)' || true)
            if [ -z "$NON_DOCS" ] && [ -n "$CHANGED" ]; then
              RUN_FAST="false"
              RUN_FULL="false"
              echo "→ docs-only change: skip all CI"
            fi
          fi

          echo "run_fast=$RUN_FAST" >> $GITHUB_OUTPUT
          echo "run_full=$RUN_FULL" >> $GITHUB_OUTPUT
          echo "Final: fast=$RUN_FAST full=$RUN_FULL"

  # ─────────────────────────────────────────────────────────────────
  # Fast path: syntax + duplicate-endpoint + critical test slice
  # Runs on every non-docs PR. ~3-4 min.
  # ─────────────────────────────────────────────────────────────────
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: gate-decision
    if: needs.gate-decision.outputs.run_fast == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Syntax check (all Python files)
        run: |
          python -c "
          import ast, sys, os
          errors = []
          for root, dirs, files in os.walk('src'):
              dirs[:] = [d for d in dirs if d != '__pycache__']
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          ast.parse(open(path, encoding='utf-8').read())
                      except SyntaxError as e:
                          errors.append(f'{path}: {e}')
          for f in ['app.py']:
              try:
                  ast.parse(open(f, encoding='utf-8').read())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors:
                  print(f'FAIL: {e}')
              sys.exit(1)
          print('OK: all Python files compile clean')
          "

      - name: Duplicate endpoint check
        run: |
          python -c "
          import os, re, sys
          from collections import defaultdict
          funcs = defaultdict(list)
          modules_dir = 'src/api/modules'
          for fname in sorted(os.listdir(modules_dir)):
              if not fname.endswith('.py'): continue
              with open(os.path.join(modules_dir, fname), encoding='utf-8') as f:
                  for i, line in enumerate(f, 1):
                      m = re.match(r'^def\s+(\w+)\s*\(', line)
                      if m:
                          funcs[m.group(1)].append((fname, i))
          dupes = {n: locs for n, locs in funcs.items() if len(locs) > 1}
          if dupes:
              for n, locs in dupes.items():
                  print(f'DUPLICATE: {n} in {locs}')
              sys.exit(1)
          print('OK: no duplicate endpoint functions')
          "

      - name: Template syntax smoke (no jinja2 dep)
        run: |
          # Pre-push hook runs full template rendering via jinja2 with
          # dependencies installed. Here we just scan for unbalanced
          # {% block %} / {% endblock %} pairs as a dependency-free
          # smoke test. Catches the most common Jinja2 breakage.
          python -c "
          import os, sys, re
          errors = []
          for root, _, files in os.walk('src/templates'):
              for f in files:
                  if not f.endswith('.html'):
                      continue
                  path = os.path.join(root, f)
                  try:
                      txt = open(path, encoding='utf-8').read()
                  except Exception as e:
                      errors.append(f'{path}: read error {e}')
                      continue
                  opens = len(re.findall(r'{%\s*block\b', txt))
                  closes = len(re.findall(r'{%\s*endblock\b', txt))
                  if opens != closes:
                      errors.append(f'{path}: {opens} blocks vs {closes} endblocks')
          if errors:
              for e in errors:
                  print(f'FAIL: {e}')
              sys.exit(1)
          print('OK: template block pairs balanced')
          "

  # ─────────────────────────────────────────────────────────────────
  # Fast test slice — runs on every PR. ~3 min.
  # Critical subset only: classifier + ingest + golden path +
  # package completeness. These catch the top regression classes.
  # ─────────────────────────────────────────────────────────────────
  tests-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    needs: gate-decision
    if: needs.gate-decision.outputs.run_fast == 'true' && needs.gate-decision.outputs.run_full != 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install --quiet -r requirements.txt
      - name: Run critical test slice
        env:
          SECRET_KEY: test-secret-key-for-ci
          DASH_USER: test
          DASH_PASS: test
          FLASK_ENV: testing
          ENABLE_BACKGROUND_AGENTS: "false"
          ENABLE_EMAIL_POLLING: "false"
        run: |
          python -m pytest \
            tests/test_request_classifier.py \
            tests/test_ingest_pipeline.py \
            tests/test_golden_path.py \
            tests/test_package_completeness.py \
            tests/test_email_requirements_validator.py \
            tests/test_feature_flags.py \
            tests/test_utilization.py \
            tests/test_railway_deploy_watcher.py \
            tests/test_cchcs_packet_filler.py::TestAttachmentSplicing \
            tests/test_cchcs_packet_route.py \
            tests/test_facility_registry.py \
            tests/test_tax_resolver.py \
            tests/test_quote_generator_facility_resolve.py \
            tests/test_ghost_detection.py \
            tests/test_home_queue_ghost_filter_dedup.py \
            tests/test_package_signatures_vs_northstar.py \
            tests/test_calrecycle_multipage_overflow.py \
            -n auto -q --tb=short

  # ─────────────────────────────────────────────────────────────────
  # Full test suite — runs on push to main, workflow_dispatch, or
  # PRs with `full-ci` label.
  # 2026-04-19: #229 main run was killed at 20:15 at 79% progress;
  # linear extrapolation put clean runtime ≈ 25-26 min. Tightened to
  # 25 min then hit 25:16 timeout. Restored to 30 min — the safety
  # margin matters more than a slightly stale upper bound.
  # ─────────────────────────────────────────────────────────────────
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: gate-decision
    if: needs.gate-decision.outputs.run_full == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install --quiet -r requirements.txt
      - name: Run full test suite
        env:
          SECRET_KEY: test-secret-key-for-ci
          DASH_USER: test
          DASH_PASS: test
          FLASK_ENV: testing
          ENABLE_BACKGROUND_AGENTS: "false"
          ENABLE_EMAIL_POLLING: "false"
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_award_intelligence.py \
            --ignore=tests/smoke_test.py \
            -n auto -q --tb=short

  # ─────────────────────────────────────────────────────────────────
  # Pre-deploy — only when running full CI. ~3 min.
  # ─────────────────────────────────────────────────────────────────
  pre-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [gate-decision, checks]
    if: needs.gate-decision.outputs.run_full == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install --quiet -r requirements.txt
      - name: Run pre-deploy validation
        env:
          SECRET_KEY: test
          FLASK_ENV: testing
          TESTING: "1"
          ENABLE_BACKGROUND_AGENTS: "false"
          ENABLE_EMAIL_POLLING: "false"
        run: python -u tests/pre_deploy_check.py

  # ─────────────────────────────────────────────────────────────────
  # Gate — unified final status. Passes if:
  #   - fast path ran and checks+tests-fast passed, OR
  #   - full path ran and checks+tests+pre-deploy passed, OR
  #   - gate-decision said to skip (docs-only)
  # This is the required status check for branch protection.
  # ─────────────────────────────────────────────────────────────────
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs: [gate-decision, checks, tests-fast, tests, pre-deploy]
    if: always()
    steps:
      - name: Evaluate gate
        run: |
          FAST="${{ needs.gate-decision.outputs.run_fast }}"
          FULL="${{ needs.gate-decision.outputs.run_full }}"
          CHECKS="${{ needs.checks.result }}"
          FAST_RESULT="${{ needs.tests-fast.result }}"
          FULL_RESULT="${{ needs.tests.result }}"
          PREDEPLOY="${{ needs.pre-deploy.result }}"
          echo "fast=$FAST full=$FULL checks=$CHECKS tests-fast=$FAST_RESULT tests=$FULL_RESULT pre-deploy=$PREDEPLOY"

          # Docs-only skip path
          if [ "$FAST" = "false" ] && [ "$FULL" = "false" ]; then
            echo "OK: docs-only change, CI skipped by design"
            exit 0
          fi

          # Full path (push to main, workflow_dispatch, full-ci label)
          if [ "$FULL" = "true" ]; then
            if [ "$CHECKS" = "success" ] && [ "$FULL_RESULT" = "success" ] && [ "$PREDEPLOY" = "success" ]; then
              echo "OK: full CI passed"
              exit 0
            fi
            echo "FAIL: full CI path did not fully succeed"
            exit 1
          fi

          # Fast path (normal PR)
          if [ "$FAST" = "true" ]; then
            if [ "$CHECKS" = "success" ] && [ "$FAST_RESULT" = "success" ]; then
              echo "OK: fast CI passed"
              exit 0
            fi
            echo "FAIL: fast CI path did not fully succeed"
            exit 1
          fi

          echo "FAIL: unknown CI state"
          exit 1
